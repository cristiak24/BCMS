<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>BaschetPro - Diagnostic Complet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap'); body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="max-w-6xl mx-auto p-6">
        <header class="mb-10 text-center">
            <h1 class="text-5xl font-black text-slate-900 tracking-tighter italic uppercase">BASCHET<span class="text-red-600">PRO</span></h1>
        </header>

        <div class="bg-white p-8 rounded-[30px] shadow-xl border border-slate-100 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-5 gap-4 items-end">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase">1. Categorie</label>
                    <select id="leagueSelect" onchange="loadSeasons()" class="w-full border rounded-xl p-3 text-sm font-bold bg-slate-50">
                        <option value="">Alege...</option>
                        <optgroup label="ID-URI NOI">
                            <option value="25493">LNBM (25493)</option>
                            <option value="25523">Liga 1 (25523)</option>
                        </optgroup>
                    </select>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase">2. Sezon</label>
                    <select id="seasonSelect" onchange="loadTeams()" class="w-full border rounded-xl p-3 text-sm font-bold bg-white">
                        <option value="">Așteptare...</option>
                    </select>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase">3. Echipă</label>
                    <select id="teamSelect" class="w-full border rounded-xl p-3 text-sm font-bold bg-white">
                        <option value="">Așteptare...</option>
                    </select>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase">4. Luna</label>
                    <select id="monthSelect" class="w-full border rounded-xl p-3 text-sm font-bold bg-white">
                        <option value="3" selected>Martie</option>
                        <option value="4">Aprilie</option>
                    </select>
                </div>
                <button onclick="fetchMatches()" class="bg-red-600 text-white font-black py-4 px-4 rounded-xl uppercase text-xs">Sincronizare</button>
            </div>
        </div>
        <div id="loader" class="hidden py-10 text-center"><div class="h-8 w-8 animate-spin rounded-full border-4 border-red-600 border-r-transparent mx-auto"></div></div>
        <div id="resultsGrid" class="space-y-3"></div>
    </div>

    <script>
        const BASE = 'http://localhost:3001';
        async function loadSeasons() {
            const leagueId = document.getElementById('leagueSelect').value;
            if (!leagueId) return;
            try {
                const res = await fetch(`${BASE}/seasons-by-league?leagueId=${leagueId}`);
                const data = await res.json();
                document.getElementById('seasonSelect').innerHTML = data.map(s => `<option value="${s.id}">${s.text}</option>`).join('');
                loadTeams();
            } catch (err) { console.error(err); }
        }
        async function loadTeams() {
            const leagueId = document.getElementById('leagueSelect').value;
            const seasonId = document.getElementById('seasonSelect').value;
            if (!leagueId || !seasonId) return;
            const tSel = document.getElementById('teamSelect');
            tSel.innerHTML = '<option>Se caută...</option>';
            try {
                const res = await fetch(`${BASE}/teams-by-season?leagueId=${leagueId}&seasonId=${seasonId}`);
                const data = await res.json();
                tSel.innerHTML = data.length > 0 ? 
                    data.map(t => `<option value="${t.id}">${t.name}</option>`).join('') :
                    '<option value="">EROARE: 0 Echipe</option>';
            } catch (err) { console.error(err); }
        }
        async function fetchMatches() {
            const lId = document.getElementById('leagueSelect').value;
            const sId = document.getElementById('seasonSelect').value;
            const tId = document.getElementById('teamSelect').value;
            const m = document.getElementById('monthSelect').value;
            const grid = document.getElementById('resultsGrid');
            const loader = document.getElementById('loader');
            if (!tId) return alert("Alege o echipă!");
            loader.classList.remove('hidden'); grid.innerHTML = '';
            try {
                const res = await fetch(`${BASE}/matches?teamId=${tId}&seasonId=${sId}&month=${m}&leagueId=${lId}`);
                const html = await res.text();
                const temp = document.createElement('div'); temp.innerHTML = html;
                temp.querySelectorAll('tr').forEach(row => {
                    const c = row.querySelectorAll('td');
                    if (c.length >= 4 && c[0].innerText.trim() !== "") {
                        grid.innerHTML += `<div class="bg-white p-6 rounded-2xl border flex items-center shadow-sm">
                            <div class="w-24 text-[10px] font-black text-slate-300 uppercase italic">Data: ${c[0].innerText.trim()}</div>
                            <div class="flex-1 flex items-center justify-between px-8">
                                <span class="flex-1 text-right font-bold text-slate-700 text-sm italic">${c[1].innerText.trim()}</span>
                                <span class="mx-6 bg-slate-900 text-white px-5 py-2 rounded-xl font-black text-lg">${c[2].innerText.replace(/\s+/g, '')}</span>
                                <span class="flex-1 text-left font-bold text-slate-700 text-sm italic">${c[3].innerText.trim()}</span>
                            </div>
                        </div>`;
                    }
                });
            } catch (err) { console.error(err); } finally { loader.classList.add('hidden'); }
        }
    </script>
</body>
</html>
